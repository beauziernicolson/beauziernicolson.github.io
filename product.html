<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Produit — YANEX SHOP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header scrolled">
  <div class="container nav">
    <a class="brand" href="index.html">YANEX SHOP</a>
    <nav class="nav-links">
      <a href="category.html?c=hair">Hair</a>
      <div class="has-sub">
        <a href="category.html?c=fashion&g=women">Fashion ▾</a>
        <div class="submenu">
          <a href="category.html?c=fashion&g=women">Women</a>
          <a href="category.html?c=fashion&g=men">Men</a>
        </div>
      </div>
      <a href="category.html?c=sneakers">Sneakers</a>
      <a href="category.html?c=accessories">Accessories</a>
    </nav>
    <div class="header-actions">
      <button class="cart-btn" id="cart-btn" aria-label="Cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="m1 1 4 4h15l-1 5H6"></path>
        </svg>
        <span class="cart-badge" id="cart-badge">0</span>
      </button>
      <a class="cta-wa" href="#" id="header-wa" target="_blank">WhatsApp</a>
    </div>
    <button class="menu-btn">☰</button>
  </div>
</header>

<!-- CART DRAWER -->
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-header">
    <h3>Your Cart</h3>
    <button class="cart-close" id="cart-close" aria-label="Close cart">×</button>
  </div>
  <div class="cart-content" id="cart-content">
    <div class="cart-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="m1 1 4 4h15l-1 5H6"></path>
      </svg>
      <p>Your cart is empty</p>
      <button class="btn btn-ghost" onclick="closeCart('categories')">Start shopping</button>
    </div>
  </div>
  <div class="cart-footer" id="cart-footer" style="display:none">
    <div class="cart-subtotal">
      <span>Subtotal</span>
      <span id="cart-subtotal">$0.00</span>
    </div>
    <button class="btn btn-primary" id="checkout-btn">Checkout</button>
  </div>
</div>
<div class="cart-overlay" id="cart-overlay"></div>

<div class="container">
  <div id="product-page" class="product-page"></div>
</div>

<footer>
  <div class="container">
    <div class="legal">
      <span>© 2026 YANEX SHOP — Made in Haiti 🇭🇹</span>
      <a href="index.html" style="color:var(--gold-2)">Retour à l'accueil</a>
    </div>
  </div>
</footer>

<a class="fab" id="fab-wa" href="#" target="_blank">💬</a>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script src="js/app.js"></script>
<script>
  const u=whatsappUrl();["header-wa","fab-wa"].forEach(id=>{const el=document.getElementById(id);if(el)el.href=u;});
</script>
</body>
</html>
